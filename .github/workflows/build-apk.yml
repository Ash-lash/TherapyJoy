name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_API_BASE: http://10.0.2.2:4001/api
          EXPO_PUBLIC_FIREBASE_API_KEY: AIzaSyAEPj3-Lg9RPOXYF8c0-_C8u4YsyKI8KsU
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: therapyjoy-461f5.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: therapyjoy-461f5
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: therapyjoy-461f5.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '631566063276'
          EXPO_PUBLIC_FIREBASE_APP_ID: '1:631566063276:web:9e28ae05662b2cda4db109'
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: therapyjoy-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
