name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Clean up embedded git repos
        run: find . -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Configure Git
        run: |
          git config --global user.email "build@therapyjoy.com"
          git config --global user.name "TherapyJoy Build"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: cd mobile && npm install --legacy-peer-deps 2>&1

      - name: Login to Expo
        run: cd mobile && eas login --non-interactive --username ${{ secrets.EXPO_USERNAME }} --password ${{ secrets.EXPO_PASSWORD }} 2>&1

      - name: Build APK
        run: cd mobile && eas build --platform android --non-interactive --wait 2>&1

      - name: Download APK
        run: |
          cd mobile
          mkdir -p dist
          # Get latest build artifacts (EAS outputs to dist by default)

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: therapyjoy-apk
          path: mobile/dist/**/*.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: build-${{ github.run_number }}
          name: TherapyJoy APK Build ${{ github.run_number }}
          body: "APK ready for download"
